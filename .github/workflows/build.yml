name: Flutter Cloud APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Network & Camera Packages
        run: flutter pub get

      - name: Compile Universal Fat APK Binary
        run: flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Upload Exported APK to Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-camera-app
          path: build/app/outputs/flutter-apk/app-debug.apk